services:
  evolution-api:
    container_name: barbersaas_evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      evolution-redis:
        condition: service_started
      evolution-postgres:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    env_file:
      - .env
    networks:
      - evolution-net

  evolution-redis:
    container_name: barbersaas_evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net

  evolution-postgres:
    container_name: barbersaas_evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evolution_api}
      POSTGRES_USER: ${POSTGRES_USERNAME:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution_pass}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - evolution-net

volumes:
  evolution_instances:
  evolution_redis:
  evolution_postgres:

networks:
  evolution-net:
    driver: bridge
